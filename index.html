                            <label className="block text-xs text-gray-500 mb-1">{t('month')}</label>
                            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded p-2 text-sm w-32">
                                <option value="All">{t('filter_all')}</option>
                                {months.map(m => <option key={m.val} value={m.val}>{m.label}</option>)}
                            </select>
                        </div>
                        {isAdmin && (
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">{t('employee')}</label>
                                <select value={filterEmp} onChange={e=>setFilterEmp(e.target.value)} className="border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded p-2 text-sm w-48">
                                    <option value="All">{t('filter_all')}</option>
                                    {data.employees?.map(e => <option key={e.id} value={e.id}>{e.id} - {e.name}</option>)}
                                </select>
                            </div>
                        )}
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                        <table className="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr className="bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-300">
                                    <th className="p-4">{t('period')}</th>{isAdmin && <th className="p-4">{t('employee')}</th>}<th className="p-4">{t('base_salary')}</th><th className="p-4">{t('deductions')}</th><th className="p-4">{t('net_pay')}</th><th className="p-4 text-center">{t('action')}</th>
                                </tr>
                            </thead>
                            <tbody>
                                {currentRecords.length === 0 && <tr><td colSpan={isAdmin?6:5} className="p-4 text-center text-gray-500">ไม่มีข้อมูล</td></tr>}
                                {currentRecords.map(r => {
                                    const emp = data.employees?.find(e => String(e.id).trim().toLowerCase() === String(r.empId).trim().toLowerCase());
                                    
                                    // คำนวณยอดหักรวมทั้งหมด
                                    const calcDed = (r.calculatedDeductions || []).reduce((s, d) => s + (parseFloat(d.amount) || 0), 0);
                                    const custDed = (r.customDeductions || []).reduce((s, d) => s + (parseFloat(d.amount) || 0), 0);
                                    const legacyDed = (parseFloat(r.ssDeduction) || 0) + (parseFloat(r.taxDeduction) || 0);
                                    const totalDed = calcDed + custDed + legacyDed;

                                    return (
                                        <tr key={r.id} className="border-b border-gray-50 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                                            <td className="p-4 font-medium">{r.month}/{r.year}</td>
                                            {isAdmin && <td className="p-4">{emp?.name || r.empId}</td>}
                                            <td className="p-4">{formatCurrency(r.baseSalary)}</td>
                                            <td className="p-4 text-red-500">{formatCurrency(totalDed)}</td>
                                            <td className="p-4 font-bold text-green-600 dark:text-green-400">{formatCurrency(r.netPay)}</td>
                                            <td className="p-4 flex justify-center gap-2">
                                                <button onClick={() => setViewSlip({...r, emp})} className="px-3 py-1 bg-blue-50 dark:bg-blue-900 text-blue-600 dark:text-blue-200 rounded text-xs flex items-center gap-1"><Icons.Eye /> Slip</button>
                                                {isAdmin && <button onClick={() => handleEditClick(r)} className="p-1.5 bg-yellow-50 dark:bg-yellow-900 text-yellow-600 dark:text-yellow-200 rounded hover:bg-yellow-100"><Icons.Edit /></button>}
                                                {isAdmin && <button onClick={() => {
                                                    SwalAlert.fire({ title: 'ลบข้อมูล?', text: 'คุณต้องการลบสลิปเงินเดือนนี้หรือไม่', icon: 'warning', showCancelButton: true }).then(res => {
                                                        if(res.isConfirmed){ deleteRecord('salaryRecords', r.id); SwalAlert.fire('Deleted!', '', 'success'); }
                                                    });
                                                }} className="p-1.5 bg-red-50 dark:bg-red-900 text-red-600 dark:text-red-200 rounded hover:bg-red-100"><Icons.Trash /></button>}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                        
                        {/* Pagination UI */}
                        {totalPages > 1 && (
                            <div className="flex flex-col sm:flex-row justify-between items-center px-6 py-4 border-t dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 gap-4">
                                <div className="text-sm text-gray-500 dark:text-gray-400">
                                    แสดง {indexOfFirstItem + 1} ถึง {Math.min(indexOfLastItem, records.length)} จาก {records.length} รายการ
                                </div>
                                <div className="flex gap-2 items-center">
                                    <button
                                        onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))}
                                        disabled={currentPage === 1}
                                        className="px-3 py-1 border dark:border-gray-600 rounded bg-white dark:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-100 dark:hover:bg-gray-600 text-sm transition"
                                    >
                                        ก่อนหน้า
                                    </button>
                                    <div className="text-sm font-medium text-gray-700 dark:text-gray-300 px-2">
                                        หน้า {currentPage} / {totalPages}
                                    </div>
                                    <button
                                        onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))}
                                        disabled={currentPage === totalPages}
                                        className="px-3 py-1 border dark:border-gray-600 rounded bg-white dark:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-100 dark:hover:bg-gray-600 text-sm transition"
                                    >
                                        ถัดไป
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {isAdmin && (
                        <Modal isOpen={showCalc} onClose={() => setShowCalc(false)} title={calcForm.id ? 'แก้ไขสลิปเงินเดือน' : t('calc_salary')}>
                            <div className="space-y-6 text-gray-800 dark:text-gray-200">
                                <div className="grid grid-cols-3 gap-4">
                                    <div><label className="block text-xs mb-1">Year</label><select value={calcForm.year} onChange={e=>setCalcForm({...calcForm, year:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 p-2 rounded"><option value="">Select</option>{years.map(y=><option key={y}>{y}</option>)}</select></div>
                                    <div><label className="block text-xs mb-1">Month</label><select value={calcForm.month} onChange={e=>setCalcForm({...calcForm, month:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 p-2 rounded"><option value="">Select</option>{months.map(m=><option key={m.val} value={m.val}>{m.label}</option>)}</select></div>
                                    <div><label className="block text-xs mb-1">Employee</label><select value={calcForm.empId} onChange={e=>setCalcForm({...calcForm, empId:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 p-2 rounded"><option value="">Select Employee</option>{data.employees?.map(e=><option key={e.id} value={e.id}>{e.id} - {e.name}</option>)}</select></div>
                                </div>

                                {calcForm.empId && (
                                    <div className="grid grid-cols-2 gap-8 border-t dark:border-gray-700 pt-4">
                                        {/* EARNINGS */}
                                        <div>
                                            <h4 className="font-bold mb-4 border-b dark:border-gray-700 pb-2 text-[#c8a97e]">{t('earnings')}</h4>
                                            <div className="flex justify-between text-sm mb-2"><span>{t('base_salary')}</span><span>{formatCurrency(baseSalary)}</span></div>
                                            
                                            {(data.settings?.incomes || []).map(inc => (
                                                <div key={inc.id} className="flex justify-between items-center text-sm mb-2">
                                                    <span>{inc.name} <span className="text-gray-400 text-xs">
                                                        {inc.type === 'percent' ? `(${inc.rate}%)` : (inc.type === 'multiplier' ? `(${inc.rate} เท่า)` : `(${inc.rate})`)}
                                                    </span></span>
                                                    {inc.type === 'percent' ? (
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-xs text-gray-400">Apply</span>
                                                            <input type="checkbox" checked={calcForm.dynamicIncomes[inc.id] !== false} onChange={e => setCalcForm({...calcForm, dynamicIncomes: {...calcForm.dynamicIncomes, [inc.id]: e.target.checked}})} />
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center gap-2">
                                                            <input type="number" placeholder={inc.type === 'multiplier' ? "ชั่วโมง" : "จำนวน"} value={calcForm.dynamicIncomes[inc.id] || ''} onChange={e => setCalcForm({...calcForm, dynamicIncomes: {...calcForm.dynamicIncomes, [inc.id]: e.target.value}})} className="w-20 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1 text-right" />
                                                            <span className="text-gray-500 text-xs">
                                                                {inc.type === 'multiplier' ? `x ${inc.rate} เท่า` : `x ${inc.rate}`}
                                                            </span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            
                                            <div className="mt-4 border-t dark:border-gray-700 pt-2">
                                                <div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold">{t('custom_earn')}</span><button onClick={()=>arrUpdate('customEarnings', 'add')} className="text-xs text-[#c8a97e]">{t('add_item')}</button></div>
                                                {calcForm.customEarnings.map((c, i) => (
                                                    <div key={i} className="flex gap-2 mb-2">
                                                        <input placeholder="Name" value={c.name} onChange={e=>arrUpdate('customEarnings', 'update', i, 'name', e.target.value)} className="w-1/2 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1 text-sm"/>
                                                        <input type="number" value={c.amount} onChange={e=>arrUpdate('customEarnings', 'update', i, 'amount', e.target.value)} className="w-1/3 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1 text-sm text-right"/>
                                                        <button onClick={()=>arrUpdate('customEarnings', 'remove', i)} className="text-red-500"><Icons.X /></button>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex justify-between font-bold text-green-600 dark:text-green-400 mt-4 border-t dark:border-gray-700 pt-2"><span>Total</span><span>{formatCurrency(earningsTotal)}</span></div>
                                        </div>

                                        {/* DEDUCTIONS */}
                                        <div>
                                            <h4 className="font-bold mb-4 border-b dark:border-gray-700 pb-2 text-[#c8a97e]">{t('deductions')}</h4>
                                            
                                            {(data.settings?.deductions || []).map(ded => (
                                                <div key={ded.id} className="flex justify-between items-center text-sm mb-2">
                                                    <span>{ded.name} <span className="text-gray-400 text-xs">
                                                        {ded.type === 'percent' ? `(${ded.rate}%)` : (ded.type === 'multiplier' ? `(${ded.rate} เท่า)` : `(${ded.rate})`)}
                                                    </span></span>
                                                    {ded.type === 'percent' ? (
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-xs text-gray-400">Apply</span>
                                                            <input type="checkbox" checked={calcForm.dynamicDeductions[ded.id] !== false} onChange={e => setCalcForm({...calcForm, dynamicDeductions: {...calcForm.dynamicDeductions, [ded.id]: e.target.checked}})} />
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center gap-2">
                                                            <input type="number" placeholder={ded.type === 'multiplier' ? "ชั่วโมง" : "จำนวน"} value={calcForm.dynamicDeductions[ded.id] || ''} onChange={e => setCalcForm({...calcForm, dynamicDeductions: {...calcForm.dynamicDeductions, [ded.id]: e.target.value}})} className="w-20 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1 text-right" />
                                                            <span className="text-gray-500 text-xs">
                                                                {ded.type === 'multiplier' ? `x ${ded.rate} เท่า` : `x ${ded.rate}`}
                                                            </span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}

                                            <div className="mt-6 border-t dark:border-gray-700 pt-2">
                                                <div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold">{t('custom_deduct')}</span><button onClick={()=>arrUpdate('customDeductions', 'add')} className="text-xs text-[#c8a97e]">{t('add_item')}</button></div>
                                                {calcForm.customDeductions.map((c, i) => (
                                                    <div key={i} className="flex gap-2 mb-2">
                                                        <input placeholder="Name" value={c.name} onChange={e=>arrUpdate('customDeductions', 'update', i, 'name', e.target.value)} className="w-1/2 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1 text-sm"/>
                                                        <input type="number" value={c.amount} onChange={e=>arrUpdate('customDeductions', 'update', i, 'amount', e.target.value)} className="w-1/3 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1 text-sm text-right"/>
                                                        <button onClick={()=>arrUpdate('customDeductions', 'remove', i)} className="text-red-500"><Icons.X /></button>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex justify-between font-bold text-red-500 mt-4 border-t dark:border-gray-700 pt-2"><span>Total</span><span>{formatCurrency(deductionsTotal)}</span></div>
                                        </div>
                                    </div>
                                )}
                                
                                {calcForm.empId && (
                                    <div className="bg-gray-100 dark:bg-gray-700 p-4 rounded-lg flex justify-between items-center mt-6">
                                        <div className="text-lg font-bold">{t('net_pay')}</div>
                                        <div className="text-2xl font-bold text-green-600 dark:text-green-400">{formatCurrency(netPay)}</div>
                                    </div>
                                )}

                                <div className="pt-4 flex justify-end gap-2 border-t dark:border-gray-700">
                                    <button onClick={()=>setShowCalc(false)} className="px-4 py-2 border dark:border-gray-600 rounded">{t('cancel')}</button>
                                    <button onClick={handleSaveRecord} disabled={!calcForm.empId} className="px-4 py-2 bg-[#c8a97e] text-white rounded disabled:opacity-50">{t('save')}</button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {/* Highly Formatted Payslip Modal */}
                    <Modal isOpen={!!viewSlip} onClose={() => setViewSlip(null)} title="Payslip" isPrintable={true}>
                        {viewSlip && (
                            <div className="bg-white text-black font-sans text-sm p-4 print-area">
                                <div className="text-center mb-6">
                                    {data.settings?.logoUrl && <img src={data.settings.logoUrl} alt="Logo" className="h-20 mx-auto mb-3 object-contain" />}
                                    <h1 className="text-2xl font-bold mb-1">{data.settings?.companyName}</h1>
                                    <p className="text-xs text-gray-600">{data.settings?.address} | Tel: {data.settings?.phone}</p>
                                    <h2 className="text-xl font-bold mt-4 border-b-2 border-black inline-block pb-1">PAYSLIP / ใบแจ้งเงินเดือน</h2>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-y-2 gap-x-2 mb-6 text-sm border p-4 border-gray-300">
                                    <div><span className="font-semibold w-24 inline-block">ID:</span> {viewSlip.emp?.id}</div>
                                    <div><span className="font-semibold w-24 inline-block">Period:</span> {months.find(m=>m.val == viewSlip.month)?.label} {viewSlip.year}</div>
                                    <div><span className="font-semibold w-24 inline-block">Name:</span> {viewSlip.emp?.prefix} {viewSlip.emp?.name}</div>
                                    <div><span className="font-semibold w-24 inline-block">Position:</span> {viewSlip.emp?.position}</div>
                                    <div className="col-span-2"><span className="font-semibold w-24 inline-block">Bank/Acc:</span> {viewSlip.emp?.bankName} ({viewSlip.emp?.bankAccount})</div>
                                </div>

                                <div className="grid grid-cols-2 gap-0 border border-gray-300 mb-6">
                                    {/* EARNINGS */}
                                    <div className="border-r border-gray-300">
                                        <h3 className="font-bold border-b border-gray-300 bg-gray-100 p-2 text-center">Income (รายการเงินได้)</h3>
                                        <div className="p-2 space-y-1 min-h-[150px]">
                                            <div className="flex justify-between"><span>Base Salary</span><span>{formatCurrency(viewSlip.baseSalary)}</span></div>
                                            
                                            {/* Legacy records support */}
                                            {viewSlip.otPay > 0 && <div className="flex justify-between"><span>OT ({viewSlip.otHours}h)</span><span>{formatCurrency(viewSlip.otPay)}</span></div>}
                                            {viewSlip.caseTraining1 > 0 && <div className="flex justify-between"><span>Training (≤1)</span><span>{formatCurrency(viewSlip.caseTraining1)}</span></div>}
                                            {viewSlip.caseTraining2 > 0 && <div className="flex justify-between"><span>Training (>1)</span><span>{formatCurrency(viewSlip.caseTraining2)}</span></div>}
                                            
                                            {/* New dynamic records */}
                                            {viewSlip.calculatedIncomes?.map((inc,i) => <div key={'calc_i'+i} className="flex justify-between"><span>{inc.name} {inc.qty ? `(${inc.qty} x ${inc.rate})` : ''}</span><span>{formatCurrency(inc.amount)}</span></div>)}
                                            
                                            {viewSlip.customEarnings?.map((e,i) => <div key={i} className="flex justify-between"><span>{e.name}</span><span>{formatCurrency(e.amount)}</span></div>)}
                                        </div>
                                    </div>
                                    {/* DEDUCTIONS */}
                                    <div>
                                        <h3 className="font-bold border-b border-gray-300 bg-gray-100 p-2 text-center">Deductions (รายการเงินหัก)</h3>
                                        <div className="p-2 space-y-1 min-h-[150px]">
                                            {/* Legacy records support */}
                                            {viewSlip.ssDeduction > 0 && <div className="flex justify-between"><span>Social Security</span><span>{formatCurrency(viewSlip.ssDeduction)}</span></div>}
                                            {viewSlip.taxDeduction > 0 && <div className="flex justify-between"><span>Tax</span><span>{formatCurrency(viewSlip.taxDeduction)}</span></div>}
                                            
                                            {/* New dynamic records */}
                                            {viewSlip.calculatedDeductions?.map((ded,i) => <div key={'calc_d'+i} className="flex justify-between"><span>{ded.name} {ded.qty ? `(${ded.qty} x ${ded.rate})` : ''}</span><span>{formatCurrency(ded.amount)}</span></div>)}

                                            {viewSlip.customDeductions?.map((d,i) => <div key={i} className="flex justify-between"><span>{d.name}</span><span>{formatCurrency(d.amount)}</span></div>)}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center bg-gray-100 border border-gray-300 p-4 mb-4 font-bold text-lg">
                                    <div>Net Pay (รับสุทธิ)</div>
                                    <div className="text-xl underline">{formatCurrency(viewSlip.netPay)}</div>
                                </div>
                                <div className="text-center italic text-sm text-gray-700 font-bold bg-gray-50 p-2 border border-gray-300 rounded mb-12">
                                    ({ThaiBahtText(viewSlip.netPay)})
                                </div>

                                <div className="flex flex-col mt-12">
                                    <div className="flex justify-end pr-8">
                                        <div className="text-center">
                                            <div className="text-sm mb-2">นางสาวสุทธิพร สมเนตร</div>
                                            <div className="border-b border-black w-48 mx-auto mb-2"></div>
                                            <div className="text-xs font-bold">ผู้จ่ายเงิน</div>
                                        </div>
                                    </div>
                                    <div className="text-center text-xs text-gray-500 mt-12 mb-2">
                                        เอกสารฉบับนี้ออกโดยระบบอัตโนมัติ
                                    </div>
                                </div>

                                <div className="mt-8 flex justify-center no-print">
                                    <button onClick={triggerPrint} className="flex items-center gap-2 bg-[#c8a97e] text-white px-8 py-2 rounded-lg hover:bg-[#b3956b] shadow-lg">
                                        <Icons.Print /> Print Payslip
                                    </button>
                                </div>
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        const Settings = () => {
            const { data, t, updateRecord, forceRefresh, isSyncing } = useContext(AppContext);
            const [settings, setSettings] = useState(data.settings);
            
            const update = (f, v) => setSettings({...settings, [f]: v});
            
            const handleSave = () => {
                updateRecord('settings', null, settings);
                SwalAlert.fire('Saved', '', 'success');
            };

            const addPayrollItem = (type) => {
                setSettings({ ...settings, [type]: [...(settings[type]||[]), { id: type+'_'+Date.now(), name: '', type: 'fixed', rate: 0, max: '' }] });
            };
            const updatePayrollItem = (type, index, field, value) => {
                const arr = [...(settings[type]||[])];
                arr[index][field] = (field === 'rate' || field === 'max') && value !== '' ? parseFloat(value) : value;
                setSettings({...settings, [type]: arr});
            };
            const removePayrollItem = (type, index) => {
                const arr = [...(settings[type]||[])];
                arr.splice(index, 1);
                setSettings({...settings, [type]: arr});
            };

            const addLeaveType = () => {
                setSettings({...settings, leaveTypes: [...settings.leaveTypes, {name: 'New Leave', quota: 0, access: 'all'}]});
            };
            const updateLT = (index, field, value) => {
                const arr = [...settings.leaveTypes];
                arr[index][field] = field === 'quota' ? (parseInt(value)||0) : value;
                setSettings({...settings, leaveTypes: arr});
            };
            const removeLT = (index) => {
                const arr = [...settings.leaveTypes];
                arr.splice(index, 1);
                setSettings({...settings, leaveTypes: arr});
            };

            return (
                <div className="max-w-4xl space-y-6">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">{t('settings')}</h2>
                        <div className="flex gap-2">
                            <button onClick={forceRefresh} disabled={isSyncing} className="bg-white dark:bg-gray-800 border dark:border-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm transition"><span className={isSyncing ? "animate-spin text-[#c8a97e]" : "text-[#c8a97e]"}><Icons.Refresh /></span> {t('force_refresh')}</button>
                            <button onClick={handleSave} className="bg-[#c8a97e] text-white px-6 py-2 rounded-lg hover:bg-[#b3956b] shadow-md">{t('save_changes')}</button>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm">
                        <h3 className="font-bold mb-4 border-b dark:border-gray-700 pb-2 text-lg">{t('company_info')}</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="block text-sm mb-1 text-gray-500">Company Name</label><input value={settings.companyName} onChange={e=>update('companyName', e.target.value)} className="w-full border dark:border-gray-600 bg-transparent rounded p-2"/></div>
                            <div><label className="block text-sm mb-1 text-gray-500">{t('logo_url')}</label><input value={settings.logoUrl || ''} onChange={e=>update('logoUrl', e.target.value)} placeholder="https://..." className="w-full border dark:border-gray-600 bg-transparent rounded p-2"/></div>
                            <div><label className="block text-sm mb-1 text-gray-500">Phone</label><input value={settings.phone} onChange={e=>update('phone', e.target.value)} className="w-full border dark:border-gray-600 bg-transparent rounded p-2"/></div>
                            <div className="col-span-2"><label className="block text-sm mb-1 text-gray-500">Address</label><input value={settings.address} onChange={e=>update('address', e.target.value)} className="w-full border dark:border-gray-600 bg-transparent rounded p-2"/></div>
                            <div>
                                <label className="block text-sm mb-1 text-gray-500">HR Email <span className="text-xs text-gray-400 font-normal">(คั่นด้วย , หากมีหลายอีเมล)</span></label>
                                <input type="text" value={settings.email} onChange={e=>update('email', e.target.value)} className="w-full border dark:border-gray-600 bg-transparent rounded p-2"/>
                            </div>
                            <div>
                                <label className="block text-sm mb-1 text-gray-500">Admin Notify Email <span className="text-xs text-gray-400 font-normal">(คั่นด้วย , หากมีหลายอีเมล)</span></label>
                                <input type="text" value={settings.notifyEmail} onChange={e=>update('notifyEmail', e.target.value)} className="w-full border dark:border-gray-600 bg-transparent rounded p-2"/>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm">
                        <div className="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-2">
                            <h3 className="font-bold text-lg">{t('leave_manage')}</h3>
                            <button onClick={addLeaveType} className="text-[#c8a97e] text-sm flex items-center gap-1 hover:underline"><Icons.Plus/> {t('add_leave_type')}</button>
                        </div>
                        <div className="space-y-3">
                            {settings.leaveTypes.map((lt, i) => (
                                <div key={i} className="flex gap-4 items-center flex-wrap sm:flex-nowrap bg-gray-50 dark:bg-gray-900 p-2 rounded border dark:border-gray-700">
                                    <input value={lt.name} onChange={e=>updateLT(i, 'name', e.target.value)} placeholder="Type Name" className="flex-1 min-w-[150px] border dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm"/>
                                    <div className="flex items-center gap-2">
                                        <label className="text-sm text-gray-500 whitespace-nowrap">{t('access_right')}:</label>
                                        <select value={lt.access || 'all'} onChange={e=>updateLT(i, 'access', e.target.value)} className="w-28 border dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm text-center">
                                            <option value="all">{t('access_all')}</option>
                                            <option value="admin">{t('access_admin')}</option>
                                        </select>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <label className="text-sm text-gray-500 whitespace-nowrap">{t('quota')}:</label>
                                        <input type="number" value={lt.quota} onChange={e=>updateLT(i, 'quota', e.target.value)} className="w-20 border dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm text-center"/>
                                    </div>
                                    <button onClick={()=>removeLT(i)} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded"><Icons.Trash/></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const Layout = ({ children, setView, view, user, onLogout }) => {
            const { t, lang, setLang, theme, setTheme } = useContext(AppContext);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const isAdmin = user.role === 'Admin';

            const navItems = [
                { id: 'dashboard', label: t('dashboard'), icon: Icons.Dashboard, show: isAdmin },
                { id: 'employees', label: t('employees'), icon: Icons.Users, show: isAdmin },
                { id: 'leave', label: t('leave_ot'), icon: Icons.Calendar, show: true },
                { id: 'payroll', label: isAdmin ? t('payroll') : t('my_salary'), icon: Icons.Money, show: true },
                { id: 'settings', label: t('settings'), icon: Icons.Settings, show: isAdmin }
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className={`bg-white dark:bg-gray-800 shadow-xl border-r dark:border-gray-700 transition-all duration-300 z-20 flex flex-col no-print ${sidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-16 flex items-center justify-between px-4 border-b dark:border-gray-700">
                            {sidebarOpen && <span className="font-bold text-[#c8a97e] text-lg truncate tracking-wider">{t('app_name')}</span>}
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="text-gray-500 hover:text-[#c8a97e] p-1"><Icons.Menu /></button>
                        </div>
                        <nav className="flex-1 py-4 overflow-y-auto hide-scrollbar">
                            <ul className="space-y-2 px-3">
                                {navItems.filter(i => i.show).map(item => (
                                    <li key={item.id}>
                                        <button onClick={() => setView(item.id)} className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all ${view === item.id ? 'bg-gradient-to-r from-[#c8a97e] to-[#b3956b] text-white shadow-lg shadow-orange-900/20' : 'text-gray-600 dark:text-gray-300 hover:bg-[#e6dac8]/50 hover:text-[#b3956b] dark:hover:bg-gray-700'}`}>
                                            <item.icon /> {sidebarOpen && <span className="text-sm font-medium">{item.label}</span>}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </nav>
                        <div className="p-4 border-t dark:border-gray-700">
                            <button onClick={onLogout} className={`w-full flex items-center gap-3 px-3 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-colors ${!sidebarOpen && 'justify-center'}`}>
                                <Icons.Logout /> {sidebarOpen && <span className="text-sm font-medium">{t('logout')}</span>}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-hidden bg-gray-50 dark:bg-gray-900 transition-colors">
                        <header className="h-16 bg-white dark:bg-gray-800 shadow-sm flex items-center justify-between px-8 border-b dark:border-gray-700 z-10 no-print">
                            <h1 className="text-2xl font-bold text-gray-800 dark:text-white capitalize tracking-wide">{t(view)}</h1>
                            
                            <div className="flex items-center gap-4">
                                <button onClick={() => setLang(lang === 'th' ? 'en' : 'th')} className="flex items-center gap-1 font-bold text-gray-500 dark:text-gray-400 hover:text-[#c8a97e] transition">
                                    <Icons.Lang /> {lang === 'th' ? 'EN' : 'TH'}
                                </button>
                                <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                                    {theme === 'light' ? <Icons.Moon /> : <Icons.Sun />}
                                </button>
                                <div className="flex items-center gap-3 border-l dark:border-gray-700 pl-4 ml-2">
                                    <div className="text-right hidden sm:block">
                                        <div className="text-sm font-bold text-gray-800 dark:text-white leading-tight">{user.username}</div>
                                        <div className="text-xs text-[#c8a97e] font-medium">{user.role} {user.empId ? `(${user.empId})` : ''}</div>
                                    </div>
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#c8a97e] to-[#b3956b] shadow-md text-white flex items-center justify-center font-bold text-lg">
                                        {user.username.charAt(0).toUpperCase()}
                                    </div>
                                </div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-8 relative">
                            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5 pointer-events-none mix-blend-multiply dark:mix-blend-overlay"></div>
                            <div className="relative z-10 max-w-7xl mx-auto">{children}</div>
                        </div>
                    </main>
                </div>
            );
        };

        // ==========================================
        // MAIN APP
        // ==========================================
        
        // 🔴 นำ URL ของ Web App ที่ Deploy จาก Google Apps Script มาวางที่นี่
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwxRfp2bRszBmg7LguTAOy1oXPrsTb0Y2cxIJhFM_GQJJ6SP-uCktSdhiQU-mLrA1x-3Q/exec'; 

        const App = () => {
            const [theme, setTheme] = useState(() => localStorage.getItem('hrms_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
            const [lang, setLang] = useState(() => localStorage.getItem('hrms_lang') || 'th');
            
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [dataState, setDataState] = useState(() => {
                const cached = localStorage.getItem('hrms_data');
                if (cached) {
                    const parsed = JSON.parse(cached);
                    // Migrate old rates to dynamic incomes/deductions
                    if (!parsed.settings.incomes && !parsed.settings.deductions) {
                        parsed.settings.incomes = [{ id: 'inc_ot', name: 'ล่วงเวลา (OT)', type: 'fixed', rate: 200, max: '' }];
                        parsed.settings.deductions = [
                            { id: 'ded_ss', name: 'ประกันสังคม (SS)', type: 'percent', rate: 5, max: 750 },
                            { id: 'ded_tax', name: 'ภาษี (Tax)', type: 'percent', rate: 3, max: '' }
                        ];
                    }
                    return parsed;
                }
                return initialMockData;
            });

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('hrms_theme', theme);
            }, [theme]);

            useEffect(() => { localStorage.setItem('hrms_lang', lang); }, [lang]);

            const t = (key) => i18n[lang][key] || key;

            // ฟังก์ชันซิงค์ข้อมูลจาก Google Sheets (API)
            const fetchFromGAS = async () => {
                if (!GAS_URL || GAS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                    console.warn("ยังไม่ได้ใส่ GAS_URL ระบบจะรันในโหมด Mock/Offline");
                    return new Promise((resolve) => { setTimeout(() => { resolve(dataState); setIsSyncing(false); }, 800); });
                }
                
                setIsSyncing(true);
                try {
                    const response = await fetchWithTimeout(GAS_URL, {
                        method: 'POST',
                        redirect: 'follow', // ป้องกันปัญหาโดน Redirect
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ action: 'SYNC' })
                    }, 20000); // Timeout 20 วินาที

                    const result = await response.json();
                    
                    if (result.status === 'success' && result.data) {
                        let syncedData = result.data;
                        if (!syncedData.settings) syncedData.settings = initialMockData.settings;
                        
                        // ป้องกันข้อมูลว่างเปล่าหากตารางเพิ่งสร้าง
                        if (!syncedData.users || syncedData.users.length === 0) syncedData.users = initialMockData.users;
                        
                        setDataState(syncedData);
                        localStorage.setItem('hrms_data', JSON.stringify(syncedData));
                        return syncedData;
                    } else {
                        console.error("API Error:", result.message);
                        if(result.message && result.message.includes('setupHRMS')) {
                            SwalAlert.fire({ icon: 'error', title: 'ตั้งค่าฐานข้อมูลไม่สมบูรณ์', text: 'โปรดไปที่ Google Apps Script เลือกฟังก์ชัน "setupHRMS" แล้วกดปุ่ม "เรียกใช้" (Run) ก่อนครับ' });
                        }
                    }
                } catch (e) {
                    console.error("Network or Fetch Error:", e);
                    // เงียบๆ ไว้ ปล่อยให้ระบบใช้แคชต่อหากเกิด Error
                } finally {
                    setIsSyncing(false);
                }
                return dataState;
            };

            const forceRefresh = async () => { 
                await fetchFromGAS(); 
                SwalAlert.fire({ title: 'Synced!', text: 'อัปเดตข้อมูลล่าสุดแล้ว', icon: 'success', timer: 1500, showConfirmButton: false });
            };

            useEffect(() => { 
                if (!localStorage.getItem('hrms_data')) localStorage.setItem('hrms_data', JSON.stringify(initialMockData)); 
                fetchFromGAS(); 
            }, []);

            const handleLogin = async (u, p) => {
                setLoading(true);
                const cleanU = u.trim().toLowerCase();
                const cleanP = p.trim();

                let currentUsers = dataState.users || [];
                
                // ตรวจสอบใน Cache ก่อน
                let found = currentUsers.find(x => (x.username || '').toLowerCase() === cleanU && x.password === cleanP);
                
                // ถ้าหาไม่เจอ ให้บังคับดึงข้อมูลล่าสุดจาก Google Sheets อีกรอบ (แก้ปัญหา Cache)
                if (!found) {
                    const freshData = await fetchFromGAS();
                    currentUsers = freshData?.users || [];
                    found = currentUsers.find(x => (x.username || '').toLowerCase() === cleanU && x.password === cleanP);
                }

                if (found) { 
                    setUser(found); 
                    setView(found.role === 'Admin' ? 'dashboard' : 'leave'); 
                } else { 
                    SwalAlert.fire('Error', 'Invalid credentials / รหัสผ่านไม่ถูกต้อง (ตรวจสอบชื่อผู้ใช้และรหัสผ่านจากฐานข้อมูล)', 'error'); 
                }
                setLoading(false);
            };

            const persistData = (newState) => { setDataState(newState); localStorage.setItem('hrms_data', JSON.stringify(newState)); };

            // ระบบส่งคำสั่งเพิ่ม/แก้ไข/ลบ ไปยัง Google Sheets
            const contextValue = {
                data: dataState, user, isSyncing, forceRefresh, lang, setLang, theme, setTheme, t,
                
                addRecord: (table, record) => {
                    const newState = { ...dataState, [table]: [...(dataState[table]||[]), record] };
                    persistData(newState);
                    if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'ADD_RECORD', table, record }) }).catch(e => console.error("Add Error", e));
                    }
                },
                
                updateRecord: (table, id, updates) => {
                    if (table === 'settings') {
                        const newState = { ...dataState, settings: updates };
                        persistData(newState);
                        if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'UPDATE_SETTINGS', settings: updates }) }).catch(e => console.error("Update Settings Error", e));
                        }
                    } else {
                        const newState = { ...dataState, [table]: dataState[table].map(item => item.id === id ? { ...item, ...updates } : item) };
                        persistData(newState);
                        if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'UPDATE_RECORD', table, id, updates }) }).catch(e => console.error("Update Error", e));
                        }
                    }
                },
                
                deleteRecord: (table, id) => {
                    const newState = { ...dataState, [table]: dataState[table].filter(item => item.id !== id) };
                    persistData(newState);
                    if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'DELETE_RECORD', table, id }) }).catch(e => console.error("Delete Error", e));
                    }
                }
            };

            return (
                <AppContext.Provider value={contextValue}>
                    {!user ? <Login onLogin={handleLogin} loading={loading} /> : (
                        <Layout setView={setView} view={view} user={user} onLogout={() => setUser(null)}>
                            {view === 'dashboard' && <Dashboard />}
                            {view === 'employees' && <EmployeeManagement />}
                            {view === 'leave' && <LeaveOT />}
                            {view === 'payroll' && <Payroll />}
                            {view === 'settings' && <Settings />}
                        </Layout>
                    )}
                </AppContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
