        const ThaiBahtText = (number) => {
            if (!number || number === 0) return 'ศูนย์บาทถ้วน';
            const numStr = number.toString().split('.');
            const baht = numStr[0], satang = numStr[1] ? numStr[1].padEnd(2, '0').substring(0, 2) : '00';
            const txtNum = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
            const txtUnit = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];
            const convert = (numStr) => {
                let text = ""; const len = numStr.length;
                for (let i = 0; i < len; i++) {
                    const digit = parseInt(numStr.charAt(i));
                    if (digit !== 0) {
                        if (i === len - 1 && digit === 1 && len > 1) text += "เอ็ด";
                        else if (i === len - 2 && digit === 2) text += "ยี่";
                        else if (i === len - 2 && digit === 1) text += "";
                        else text += txtNum[digit];
                        text += txtUnit[len - i - 1];
                    }
                }
                return text;
            };
            let result = convert(baht) + "บาท";
            if (satang === '00') result += "ถ้วน"; else result += convert(satang) + "สตางค์";
            return result;

            Download: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>,
            Upload: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>,
            Search: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        };

        const initialMockData = {
            users: [{ id: 'u1', username: 'admin', password: 'password', role: 'Admin', empId: 'HDH001' }, { id: 'u2', username: 'employee', password: 'password', role: 'Employee', empId: 'HDH002' }],
            employees: [{ id: 'HDH001', prefix: 'นาย', name: 'สมชาย รักดี', nickname: 'ชาย', empType: 'Full-time', idCard: '1234567890123', gender: 'Male', dob: '1985-05-15', phone: '081-2345678', email: 'somchai@hugdee.com', position: 'HR Manager', startDate: '2020-01-01', baseSalary: 45000, bankName: 'KBank', bankAccount: '123-4-56789-0', status: 'Active', customQuotas: {} }, { id: 'HDH002', prefix: 'นางสาว', name: 'สมศรี ขยันดี', nickname: 'ศรี', empType: 'Full-time', idCard: '9876543210987', gender: 'Female', dob: '1992-08-20', phone: '089-8765432', email: 'somsri@hugdee.com', position: 'Staff', startDate: '2023-03-15', baseSalary: 25000, bankName: 'SCB', bankAccount: '098-7-65432-1', status: 'Active', customQuotas: {} }],
            leaveRequests: [],
            salaryRecords: [],
            settings: { companyName: 'Hug Dee Home Clinic', logoUrl: '', address: '123 สุขุมวิท กรุงเทพฯ 10110', phone: '02-123-4567', email: 'hr@hugdee.com', notifyEmail: 'admin@hugdee.com', leaveTypes: [{ name: 'ป่วย (Sick)', quota: 30, access: 'all' }, { name: 'ลากิจ (Personal)', quota: 6, access: 'all' }, { name: 'พักร้อน (Vacation)', quota: 10, access: 'all' }], incomes: [{ id: 'inc_ot', name: 'ล่วงเวลา (OT)', type: 'fixed', rate: 200, max: '' }], deductions: [{ id: 'ded_ss', name: 'ประกันสังคม (SS)', type: 'percent', rate: 5, max: 750 }, { id: 'ded_tax', name: 'ภาษี (Tax)', type: 'percent', rate: 3, max: '' }] }
        };

        const AppContext = createContext();

        // ==========================================
        // COMPONENTS
        // ==========================================

        const Modal = ({ isOpen, onClose, title, children, isPrintable = false }) => {
            if (!isOpen) return null;
            return (
                <div className={`fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 transition-opacity ${isPrintable ? 'print-backdrop' : ''}`}>
                    <div className={`bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto flex flex-col ${isPrintable ? 'print-content' : ''}`}>
                        <div className="flex justify-between items-center p-4 border-b dark:border-gray-700 no-print sticky top-0 bg-white dark:bg-gray-800 z-10">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-gray-100">{title}</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-red-500"><Icons.X /></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const Login = ({ onLogin, loading }) => {
            const { t } = useContext(AppContext);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#c8a97e] to-[#b3956b] dark:from-gray-800 dark:to-gray-900 relative overflow-hidden transition-colors">
                    {loading && (
                        <div className="absolute inset-0 bg-white/20 backdrop-blur-sm z-10 flex flex-col items-center justify-center text-white">
                            <div className="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p className="animate-pulse">{t('syncing')}</p>
                        </div>
                    )}
                    <div className="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl w-96 z-20">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold text-gray-800 dark:text-white mb-2">{t('app_name')}</h1>
                            <p className="text-[#c8a97e] font-medium">{t('app_desc')}</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }}>
                            <div className="mb-4">
                                <label className="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">{t('username')}</label>
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} required
                                    className="w-full px-3 py-2 border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-[#c8a97e]" />
                            </div>
                            <div className="mb-6">
                                <label className="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2">{t('password')}</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required
                                    className="w-full px-3 py-2 border dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-[#c8a97e]" />
                            </div>
                            <button type="submit" disabled={loading}
                                className="w-full bg-[#c8a97e] hover:bg-[#b3956b] text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                                {t('signin')}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const { data, forceRefresh, isSyncing, t, lang, updateRecord } = useContext(AppContext);
            const currentMonth = new Date().getMonth() + 1, currentYear = new Date().getFullYear();
            const totalEmp = data.employees?.length || 0;
            const pendingReqs = data.leaveRequests?.filter(r => r.status === 'Pending') || [];
            const totalExpenses = data.salaryRecords?.filter(r => r.year === currentYear && r.month === currentMonth).reduce((sum, r) => sum + r.netPay, 0) || 0;

            const handleApproveReject = (id, status) => {
                SwalAlert.fire({ title: `Confirm`, text: `Set status to ${status}?`, icon: 'warning', showCancelButton: true }).then((res) => {
                    if (res.isConfirmed) { updateRecord('leaveRequests', id, { status }); SwalAlert.fire('Success', '', 'success'); }
                });
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-6">
                        <h2 className="text-2xl font-bold text-gray-800 dark:text-white">{t('dashboard')}</h2>
                        <button onClick={forceRefresh} disabled={isSyncing} className="flex items-center justify-center gap-2 bg-white dark:bg-gray-800 border dark:border-gray-700 px-4 py-2 rounded-lg text-sm transition hover:bg-gray-50 dark:hover:bg-gray-700">
                            <span className={isSyncing ? "animate-spin text-[#c8a97e]" : "text-[#c8a97e]"}><Icons.Refresh /></span>
                            {isSyncing ? t('syncing') : t('force_refresh')}
                        </button>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-4 hover:shadow-md transition">
                            <div className="p-4 bg-blue-50 dark:bg-blue-900 text-blue-600 dark:text-blue-200 rounded-full"><Icons.Users /></div>
                            <div><p className="text-sm text-gray-500 dark:text-gray-400">{t('total_emp')}</p><h3 className="text-2xl font-bold">{totalEmp}</h3></div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-4 hover:shadow-md transition">
                            <div className="p-4 bg-orange-50 dark:bg-orange-900 text-orange-600 dark:text-orange-200 rounded-full"><Icons.Calendar /></div>
                            <div><p className="text-sm text-gray-500 dark:text-gray-400">{t('pending_req')}</p><h3 className="text-2xl font-bold">{pendingReqs.length}</h3></div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center gap-4 hover:shadow-md transition">
                            <div className="p-4 bg-green-50 dark:bg-green-900 text-green-600 dark:text-green-200 rounded-full"><Icons.Money /></div>
                            <div><p className="text-sm text-gray-500 dark:text-gray-400">{t('expenses')} ({new Date().toLocaleString(lang==='th'?'th-TH':'en-US', { month: 'short' })})</p><h3 className="text-2xl font-bold">{formatCurrency(totalExpenses)}</h3></div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                        <div className="p-4 border-b border-gray-100 dark:border-gray-700"><h3 className="font-semibold">{t('pending_actions')}</h3></div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr className="bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-300 text-sm">
                                        <th className="p-4">{t('employee')}</th><th className="p-4">{t('type')}</th><th className="p-4">{t('datetime')}</th><th className="p-4">{t('hours')}</th><th className="p-4 text-center">{t('action')}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {pendingReqs.length === 0 ? <tr><td colSpan="5" className="p-4 text-center text-gray-500">{t('no_pending')}</td></tr> : pendingReqs.map(req => {
                                        const emp = data.employees.find(e => e.id === req.empId);
                                        return (
                                            <tr key={req.id} className="border-b border-gray-50 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                                                <td className="p-4">{emp?.name || req.empId}</td>
                                                <td className="p-4"><span className={`px-2 py-1 rounded text-xs ${req.type==='OT'?'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-200':'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200'}`}>{req.type} ({req.subtype})</span></td>
                                                <td className="p-4 text-sm">{formatDate(req.startDate, lang)}</td>
                                                <td className="p-4">{req.hours}</td>
                                                <td className="p-4 flex justify-center gap-2">
                                                    <button onClick={() => handleApproveReject(req.id, 'Approved')} className="p-1.5 bg-green-100 text-green-600 rounded hover:bg-green-200"><Icons.Check /></button>
                                                    <button onClick={() => handleApproveReject(req.id, 'Rejected')} className="p-1.5 bg-red-100 text-red-600 rounded hover:bg-red-200"><Icons.X /></button>
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const EmployeeManagement = () => {
            const { data, forceRefresh, isSyncing, t, lang, addRecord, updateRecord, deleteRecord } = useContext(AppContext);
            const [emps, setEmps] = useState(data.employees || []);
            const [showForm, setShowForm] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [viewProfile, setViewProfile] = useState(null);
            const [formData, setFormData] = useState({});
            const [search, setSearch] = useState('');
            const [isCustomPrefix, setIsCustomPrefix] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => { setEmps(data.employees || []); }, [data.employees]);

            const filteredEmps = emps.filter(e => e.name.toLowerCase().includes(search.toLowerCase()) || e.id.toLowerCase().includes(search.toLowerCase()) || e.position.toLowerCase().includes(search.toLowerCase()));

            const handleSave = (e) => {
                e.preventDefault();
                let finalPhone = formData.phone || '';
                const cleanedPhone = finalPhone.replace(/\D/g, '');
                if (cleanedPhone.length === 10) finalPhone = `${cleanedPhone.slice(0, 3)}-${cleanedPhone.slice(3)}`;
                const dataToSave = { ...formData, phone: finalPhone };

                if (isEditMode) { 
                    updateRecord('employees', dataToSave.id, dataToSave); 
                } else { 
                    if (!dataToSave.id || dataToSave.id.includes('Auto')) {
                        const existingIds = data.employees.map(emp => String(emp.id)).filter(id => id.toUpperCase().startsWith('HDH'));
                        let nextNum = 1;
                        if (existingIds.length > 0) {
                            const nums = existingIds.map(id => parseInt(id.toUpperCase().replace('HDH', ''))).filter(n => !isNaN(n));
                            if (nums.length > 0) nextNum = Math.max(...nums) + 1;
                        }
                        dataToSave.id = 'HDH' + nextNum.toString().padStart(3, '0');
                    } else {
                        if (data.employees.find(ex => String(ex.id).trim().toLowerCase() === String(dataToSave.id).trim().toLowerCase())) {
                            return SwalAlert.fire('Error', 'รหัสพนักงานนี้มีอยู่ในระบบแล้ว', 'error');
                        }
                    }
                    addRecord('employees', dataToSave); 
                }
                setShowForm(false); SwalAlert.fire('Saved!', '', 'success');
            };

            const calculateAge = (dob) => {
                if(!dob) return '-';
                const diff = Date.now() - new Date(dob).getTime();
                const ageDate = new Date(diff); 
                return Math.abs(ageDate.getUTCFullYear() - 1970) + ' ' + t('yrs');
            };

            const calculateTenure = (startDate) => {
                if(!startDate) return '-';
                const diff = Date.now() - new Date(startDate).getTime();
                const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
                const months = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24 * 30.44));
                return `${years} ${t('yrs')} ${months} ${t('mos')}`;
            };

            const exportCSV = () => {
                const headers = ['ID', 'Prefix', 'Name', 'Nickname', 'Employee Type', 'ID Card', 'Gender', 'Position', 'Start Date', 'Phone', 'Email', 'Base Salary', 'Bank Name', 'Bank Account', 'Status'];
                const rows = emps.map(e => [e.id, e.prefix, e.name, e.nickname, e.empType, e.idCard, e.gender, e.position, e.startDate, e.phone, e.email, e.baseSalary, e.bankName, e.bankAccount, e.status]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", "employees_export.csv");
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const rows = text.split('\n').filter(row => row.trim().length > 0);
                    if(rows.length < 2) return SwalAlert.fire('Error', 'ไม่พบข้อมูลในไฟล์ CSV', 'error');

                    const headers = rows[0].split(',').map(h => h.trim());
                    let added = 0, updated = 0;

                    for(let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',').map(c => c.trim());
                        const record = {};
                        headers.forEach((h, idx) => { record[h] = cols[idx] || ''; });
                        
                        const empObj = {
                            id: record['ID'] || '',
                            prefix: record['Prefix'] || '',
                            name: record['Name'] || '',
                            nickname: record['Nickname'] || '',
                            empType: record['Employee Type'] || 'Full-time',
                            idCard: record['ID Card'] || '',
                            gender: record['Gender'] || '',
                            position: record['Position'] || '',
                            startDate: record['Start Date'] || '',
                            phone: record['Phone'] || '',
                            email: record['Email'] || '',
                            baseSalary: parseFloat(record['Base Salary']) || 0,
                            bankName: record['Bank Name'] || '',
                            bankAccount: record['Bank Account'] || '',
                            status: record['Status'] || 'Active'
                        };

                        if (empObj.name) {
                            if (empObj.id && data.employees.find(ex => String(ex.id).trim().toLowerCase() === String(empObj.id).trim().toLowerCase())) {
                                updateRecord('employees', empObj.id, empObj);
                                updated++;
                            } else {
                                if(!empObj.id) empObj.id = 'HDH' + Date.now().toString().slice(-4) + i;
                                addRecord('employees', empObj);
                                added++;
                            }
                        }
                    }
                    SwalAlert.fire('Imported', `นำเข้าสำเร็จ! เพิ่ม ${added} รายการ, อัปเดต ${updated} รายการ`, 'success');
                    if (fileInputRef.current) fileInputRef.current.value = "";
                };
                reader.readAsText(file);
            };

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-6">
                        <h2 className="text-2xl font-bold text-gray-800 dark:text-white">{t('employees')}</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <button onClick={forceRefresh} disabled={isSyncing} className="bg-white dark:bg-gray-800 border dark:border-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm transition"><span className={isSyncing ? "animate-spin text-[#c8a97e]" : "text-[#c8a97e]"}><Icons.Refresh /></span> {t('force_refresh')}</button>
                            
                            <input type="file" accept=".csv" ref={fileInputRef} onChange={importCSV} className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-blue-100 dark:hover:bg-blue-800 text-sm transition"><Icons.Upload /> {t('import_csv')}</button>
                            
                            <button onClick={exportCSV} className="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-gray-300 dark:hover:bg-gray-600 text-sm transition"><Icons.Download /> {t('export_csv')}</button>
                            
                            <button onClick={() => { setFormData({id: 'HDH-Auto', status: 'Active', empType: 'Full-time'}); setIsCustomPrefix(false); setIsEditMode(false); setShowForm(true); }} className="bg-[#c8a97e] text-white px-4 py-2 rounded-lg flex items-center gap-1 hover:bg-[#b3956b] shadow-md text-sm transition"><Icons.Plus /> {t('add_emp')}</button>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                        <div className="p-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
                            <div className="relative w-64">
                                <div className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400"><Icons.Search /></div>
                                <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder={t('search')} className="w-full pl-10 pr-4 py-2 border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-[#c8a97e] outline-none"/>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-300 text-sm">
                                        <th className="p-4">ID</th><th className="p-4">{t('name')}</th><th className="p-4">{t('position')}</th><th className="p-4">{t('tenure')}</th><th className="p-4">{t('status')}</th><th className="p-4 text-center">{t('action')}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredEmps.map(emp => (
                                        <tr key={emp.id} className="border-b border-gray-50 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                                            <td className="p-4 text-sm font-medium">{emp.id}</td>
                                            <td className="p-4"><div className="font-medium">{emp.prefix} {emp.name}</div><div className="text-xs text-gray-500">{t('nickname')}: {emp.nickname}</div></td>
                                            <td className="p-4 text-sm">{emp.position}</td>
                                            <td className="p-4 text-sm">{calculateTenure(emp.startDate)}</td>
                                            <td className="p-4"><span className={`px-2 py-1 rounded text-xs ${emp.status === 'Active' ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200' : 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200'}`}>{emp.status}</span></td>
                                            <td className="p-4 flex justify-center gap-2">
                                                <button onClick={() => setViewProfile(emp)} title={t('view')} className="p-1.5 bg-blue-50 dark:bg-blue-900 text-blue-600 dark:text-blue-200 rounded hover:bg-blue-100"><Icons.Eye /></button>
                                                <button onClick={() => { setFormData(emp); setIsCustomPrefix(!['นาย','นางสาว','นาง','Mr.','Ms.','Mrs.'].includes(emp.prefix) && !!emp.prefix); setIsEditMode(true); setShowForm(true); }} title={t('edit_emp')} className="p-1.5 bg-yellow-50 dark:bg-yellow-900 text-yellow-600 dark:text-yellow-200 rounded hover:bg-yellow-100"><Icons.Edit /></button>
                                                <button onClick={() => {
                                                    SwalAlert.fire({ title: t('delete')+'?', icon: 'warning', showCancelButton: true }).then(res => {
                                                        if(res.isConfirmed){ deleteRecord('employees', emp.id); SwalAlert.fire('Deleted!', '', 'success'); }
                                                    });
                                                }} title={t('delete')} className="p-1.5 bg-red-50 dark:bg-red-900 text-red-600 dark:text-red-200 rounded hover:bg-red-100"><Icons.Trash /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title={formData.id && !formData.id.includes('Auto') ? t('edit_emp') : t('add_emp')}>
                        <form onSubmit={handleSave} className="grid grid-cols-2 gap-4 text-gray-800 dark:text-gray-200">
                            <div>
                                <label className="block text-xs mb-1">รหัสพนักงาน</label>
                                <input type="text" value={formData.id || ''} onChange={e=>setFormData({...formData, id:e.target.value})} disabled={isEditMode} placeholder="HDH-Auto (เว้นว่างเพื่อสุ่ม)" className={`w-full border dark:border-gray-600 rounded p-2 ${isEditMode ? 'bg-gray-100 dark:bg-gray-600 cursor-not-allowed' : 'bg-white dark:bg-gray-700'}`}/>
                            </div>
                            <div><label className="block text-xs mb-1">{t('emp_type')}</label><select value={formData.empType||'Full-time'} onChange={e=>setFormData({...formData, empType:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"><option value="Full-time">{t('full_time')}</option><option value="Part-time">{t('part_time')}</option></select></div>
                            
                            <div>
                                <label className="block text-xs mb-1">{t('prefix')}</label>
                                <div className="flex gap-2">
                                    <select value={['นาย','นางสาว','นาง','Mr.','Ms.','Mrs.'].includes(formData.prefix) ? formData.prefix : (formData.prefix ? 'Other' : '')} onChange={e => { if(e.target.value === 'Other') { setIsCustomPrefix(true); setFormData({...formData, prefix: ''}); } else { setIsCustomPrefix(false); setFormData({...formData, prefix: e.target.value}); } }} className="border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2 flex-1" required>
                                        <option value="">Select</option><option value="นาย">{t('mr')}</option><option value="นางสาว">{t('ms')}</option><option value="นาง">{t('mrs')}</option><option value="Other">{t('other')}</option>
                                    </select>
                                    {isCustomPrefix && <input type="text" value={formData.prefix||''} onChange={e=>setFormData({...formData, prefix:e.target.value})} placeholder={t('other')} className="w-1/2 border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2" required/>}
                                </div>
                            </div>
                            <div><label className="block text-xs mb-1">{t('fname')}</label><input type="text" value={formData.name||''} onChange={e=>setFormData({...formData, name:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2" required/></div>
                            
                            <div><label className="block text-xs mb-1">{t('nickname')}</label><input type="text" value={formData.nickname||''} onChange={e=>setFormData({...formData, nickname:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                            <div><label className="block text-xs mb-1">{t('id_card')}</label><input type="text" value={formData.idCard||''} onChange={e=>setFormData({...formData, idCard:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                            
                            <div><label className="block text-xs mb-1">{t('gender')}</label><select value={formData.gender||''} onChange={e=>setFormData({...formData, gender:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"><option value="">Select</option><option>Male</option><option>Female</option></select></div>
                            <div>
                                <label className="flex justify-between text-xs mb-1"><span>{t('dob')}</span>{formData.dob && <span className="text-[#c8a97e] font-medium">{calculateAge(formData.dob)}</span>}</label>
                                <input type="date" value={formData.dob||''} onChange={e=>setFormData({...formData, dob:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/>
                            </div>
                            
                            <div><label className="block text-xs mb-1">{t('position')}</label><input type="text" value={formData.position||''} onChange={e=>setFormData({...formData, position:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                            <div>
                                <label className="flex justify-between text-xs mb-1"><span>{t('start_date')}</span>{formData.startDate && <span className="text-[#c8a97e] font-medium">{calculateTenure(formData.startDate)}</span>}</label>
                                <input type="date" value={formData.startDate||''} onChange={e=>setFormData({...formData, startDate:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/>
                            </div>
                            
                            <div><label className="block text-xs mb-1">{t('phone')} (0XXXXXXXXX)</label><input type="text" maxLength="10" value={formData.phone||''} onChange={e=>setFormData({...formData, phone:e.target.value})} placeholder="08xxxxxxxx" className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                            <div><label className="block text-xs mb-1">{t('email')}</label><input type="email" value={formData.email||''} onChange={e=>setFormData({...formData, email:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>

                            <div><label className="block text-xs mb-1">{t('base_salary')}</label><input type="number" value={formData.baseSalary||''} onChange={e=>setFormData({...formData, baseSalary:parseFloat(e.target.value)})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                            <div><label className="block text-xs mb-1">{t('status')}</label><select value={formData.status||'Active'} onChange={e=>setFormData({...formData, status:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"><option>Active</option><option>Inactive</option></select></div>
                            
                            <div className="col-span-2 border-t dark:border-gray-700 pt-4 mt-2">
                                <h4 className="text-sm font-semibold mb-2 text-[#c8a97e]">Banking Info</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs mb-1">{t('bank_name')}</label>
                                        <select value={formData.bankName||''} onChange={e=>setFormData({...formData, bankName:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2">
                                            <option value="">Select</option><option value="KBank">{t('bank_kbank')}</option><option value="SCB">{t('bank_scb')}</option><option value="BBL">{t('bank_bbl')}</option><option value="KTB">{t('bank_ktb')}</option><option value="BAY">{t('bank_bay')}</option><option value="TTB">{t('bank_ttb')}</option><option value="GSB">{t('bank_gsb')}</option><option value="BAAC">{t('bank_baac')}</option><option value="Other">{t('other')}</option>
                                        </select>
                                    </div>
                                    <div><label className="block text-xs mb-1">{t('bank_acc')}</label><input type="text" value={formData.bankAccount||''} onChange={e=>setFormData({...formData, bankAccount:e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                                </div>
                            </div>
                            <div className="col-span-2 pt-4 flex justify-end gap-2 border-t dark:border-gray-700 mt-4">
                                <button type="button" onClick={()=>setShowForm(false)} className="px-4 py-2 border dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-700">{t('cancel')}</button>
                                <button type="submit" className="px-4 py-2 bg-[#c8a97e] text-white rounded hover:bg-[#b3956b]">{t('save')}</button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={!!viewProfile} onClose={() => setViewProfile(null)} title="Profile" isPrintable={true}>
                        {viewProfile && (
                            <div className="text-gray-800 dark:text-gray-200">
                                <div className="text-center mb-6 border-b dark:border-gray-700 pb-4">
                                    <h1 className="text-2xl font-bold text-[#c8a97e]">{viewProfile.prefix} {viewProfile.name}</h1>
                                    <p className="text-gray-500 dark:text-gray-400">{viewProfile.position} | ID: {viewProfile.id}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-y-4 gap-x-8 text-sm px-4">
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('emp_type')}</span> {viewProfile.empType || '-'}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('id_card')}</span> {viewProfile.idCard || '-'}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('nickname')}</span> {viewProfile.nickname || '-'}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('gender')}</span> {viewProfile.gender || '-'}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('dob')}</span> {formatDate(viewProfile.dob, lang).split(' ')[0]} {viewProfile.dob && `(${calculateAge(viewProfile.dob)})`}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('start_date')}</span> {formatDate(viewProfile.startDate, lang).split(' ')[0]} {viewProfile.startDate && `(${calculateTenure(viewProfile.startDate)})`}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('phone')}</span> {viewProfile.phone || '-'}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('email')}</span> {viewProfile.email || '-'}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('base_salary')}</span> {formatCurrency(viewProfile.baseSalary)}</div>
                                    <div><span className="text-gray-500 dark:text-gray-400 block text-xs">{t('status')}</span> {viewProfile.status}</div>
                                    <div className="col-span-2 border-t dark:border-gray-700 pt-4 mt-2">
                                        <span className="text-gray-500 dark:text-gray-400 block text-xs font-semibold mb-2">Banking Details</span>
                                        {viewProfile.bankName} - {viewProfile.bankAccount}
                                    </div>
                                </div>
                                <div className="mt-8 flex justify-center no-print">
                                    <button onClick={triggerPrint} className="flex items-center gap-2 bg-gray-800 dark:bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700">
                                        <Icons.Print /> {t('print')}
                                    </button>
                                </div>
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        const LeaveOT = () => {
            const { data, user, t, lang, addRecord, updateRecord, deleteRecord, forceRefresh, isSyncing } = useContext(AppContext);
            const isAdmin = user.role === 'Admin';
            const [tab, setTab] = useState(isAdmin ? 'requests' : 'my_requests');
            const [showForm, setShowForm] = useState(false);
            
            const initialForm = { id: '', type: 'Leave', subtype: '', durationMode: 'full', startDate: '', endDate: '', reason: '', empId: user.empId, status: '' };
            const [form, setForm] = useState(initialForm);

            const myEmpId = String(user.empId || '').trim().toLowerCase();
            const myReqs = data.leaveRequests?.filter(r => String(r.empId || '').trim().toLowerCase() === myEmpId) || [];
            const allReqs = data.leaveRequests || [];
            const pendingReqs = allReqs.filter(r => r.status === 'Pending');

            const getUsedLeave = (empId, type) => {
                return data.leaveRequests.filter(r => String(r.empId || '').trim().toLowerCase() === String(empId || '').trim().toLowerCase() && r.subtype === type && r.status === 'Approved' && new Date(r.startDate).getFullYear() === new Date().getFullYear()).reduce((sum, r) => sum + (parseFloat(r.hours)/8), 0);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                let hours = 0;
                if (form.durationMode === 'full') {
                    const start = new Date(form.startDate);
                    const end = new Date(form.endDate);
                    if (end < start) return SwalAlert.fire('Error', 'วันที่สิ้นสุดต้องมากกว่าหรือเท่ากับวันที่เริ่มต้น', 'error');
                    const diffDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    hours = diffDays * 8; 
                } else {
                    hours = Math.max(0, (new Date(form.endDate) - new Date(form.startDate)) / (1000 * 60 * 60));
                    if (hours <= 0) return SwalAlert.fire('Error', 'เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มต้น', 'error');
                }

                const daysReq = hours / 8;
                if (form.type === 'Leave' && form.subtype) {
                    const quotaInfo = data.settings.leaveTypes.find(l => l.name === form.subtype);
                    if (quotaInfo && quotaInfo.quota) {
                        let used = getUsedLeave(form.empId, form.subtype);
                        if (form.id && form.status === 'Approved') {
                            const oldReq = data.leaveRequests.find(r => r.id === form.id);
                            if (oldReq && oldReq.subtype === form.subtype) {
                                used -= (parseFloat(oldReq.hours) / 8);
                            }
                        }
                        if (used + daysReq > quotaInfo.quota) {
                            const remainDaysTotal = quotaInfo.quota - used;
                            const rDays = Math.floor(remainDaysTotal);
                            const rHours = (remainDaysTotal * 8) % 8;
                            return SwalAlert.fire('Error', `โควตาวันลาไม่เพียงพอ (เหลือ ${rDays} วัน ${rHours} ชั่วโมง)`, 'error');
                        }
                    }
                }

                if (form.id) {
                    updateRecord('leaveRequests', form.id, { ...form, hours: hours.toFixed(1) });
                    SwalAlert.fire('Updated', 'แก้ไขข้อมูลสำเร็จ', 'success');
                } else {
                    addRecord('leaveRequests', { id: 'REQ'+Date.now(), ...form, hours: hours.toFixed(1), status: isAdmin ? 'Approved' : 'Pending', submittedAt: new Date().toISOString() });
                    SwalAlert.fire('Success', 'บันทึกข้อมูลสำเร็จ', 'success');
                }
                setShowForm(false);
            };

            const handleEdit = (r) => {
                let sd = r.startDate || '';
                let ed = r.endDate || '';
                if (r.durationMode === 'full') {
                    sd = sd.split('T')[0];
                    ed = ed.split('T')[0];
                } else {
                    sd = sd.slice(0, 16);
                    ed = ed.slice(0, 16);
                }
                setForm({ ...r, startDate: sd, endDate: ed });
                setShowForm(true);
            };

            const handleDelete = (id) => {
                SwalAlert.fire({ title: 'ลบ/ยกเลิกรายการ?', text: 'คุณต้องการลบหรือยกเลิกรายการนี้ใช่หรือไม่', icon: 'warning', showCancelButton: true }).then(res => {
                    if(res.isConfirmed){ deleteRecord('leaveRequests', id); SwalAlert.fire('Deleted!', 'ลบรายการสำเร็จ', 'success'); }
                });
            };

            const Table = ({ reqs, showName = false, isPendingTab = false, allowEditDelete = false }) => (
                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                    <table className="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr className="bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-300">
                                {showName && <th className="p-4">{t('employee')}</th>}<th className="p-4">{t('type')}</th><th className="p-4">{t('from_to')}</th><th className="p-4">{t('hours')}</th><th className="p-4">{t('status')}</th><th className="p-4 text-center">{t('action')}</th>
                            </tr>
                        </thead>
                        <tbody>
                            {reqs.length === 0 && <tr><td colSpan="6" className="p-4 text-center text-gray-500 dark:text-gray-400">{t('no_pending')}</td></tr>}
                            {reqs.map(r => {
                                const matchedEmp = data.employees?.find(e => String(e.id).trim().toLowerCase() === String(r.empId).trim().toLowerCase());
                                return (
                                    <tr key={r.id} className="border-b border-gray-50 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                                        {showName && <td className="p-4">{matchedEmp?.name || r.empId}</td>}
                                        <td className="p-4 font-semibold">{r.type} <span className="text-xs font-normal text-gray-500">({r.subtype})</span></td>
                                        <td className="p-4">
                                            {new Date(r.startDate).toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })} <br/>
                                            <span className="text-xs text-gray-400">
                                                {r.durationMode === 'full' || (r.startDate && r.startDate.length <= 10 && !r.startDate.includes('T'))
                                                    ? (r.startDate === r.endDate ? t('full_day') : `${new Date(r.startDate).toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', { month: 'short', day: 'numeric' })} - ${new Date(r.endDate).toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', { month: 'short', day: 'numeric' })}`)
                                                    : `${new Date(r.startDate).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})} - ${new Date(r.endDate).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}`
                                                }
                                            </span>
                                        </td>
                                        <td className="p-4">{r.type==='Leave' ? (parseFloat(r.hours)/8).toFixed(1)+' '+t('days') : r.hours+' hrs'}</td>
                                        <td className="p-4"><span className={`px-2 py-1 rounded text-xs ${r.status==='Approved'?'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200': r.status==='Rejected'?'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200':'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-200'}`}>{r.status}</span></td>
                                        <td className="p-4 flex justify-center gap-2">
                                            {isPendingTab && r.status === 'Pending' && (
                                                <>
                                                    <button onClick={()=>updateRecord('leaveRequests', r.id, {status:'Approved'})} className="p-1.5 bg-green-100 text-green-600 rounded hover:bg-green-200"><Icons.Check /></button>
                                                    <button onClick={()=>updateRecord('leaveRequests', r.id, {status:'Rejected'})} className="p-1.5 bg-red-100 text-red-600 rounded hover:bg-red-200"><Icons.X /></button>
                                                </>
                                            )}
                                            {allowEditDelete && (isAdmin || r.status === 'Pending') && (
                                                <>
                                                    <button onClick={()=>handleEdit(r)} className="p-1.5 bg-yellow-50 text-yellow-600 rounded hover:bg-yellow-100"><Icons.Edit /></button>
                                                    <button onClick={()=>handleDelete(r.id)} className="p-1.5 bg-red-50 text-red-600 rounded hover:bg-red-100"><Icons.Trash /></button>
                                                </>
                                            )}
                                            {allowEditDelete && !isAdmin && r.status !== 'Pending' && (
                                                <button onClick={() => SwalAlert.fire({title: 'รายละเอียดคำร้อง', html: `<div class="text-left mt-4 text-sm"><p><b>สถานะ:</b> ${r.status}</p><p><b>ประเภท:</b> ${r.subtype}</p><p><b>เหตุผล:</b> ${r.reason}</p></div>`, icon: r.status === 'Approved' ? 'success' : 'error'})} className="p-1.5 bg-blue-50 text-blue-600 rounded hover:bg-blue-100"><Icons.Eye /></button>
                                            )}
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );

            let requestedHours = 0;
            if (form.startDate && form.endDate) {
                if (form.durationMode === 'full') {
                    const start = new Date(form.startDate);
                    const end = new Date(form.endDate);
                    if (end >= start) requestedHours = (Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1) * 8;
                } else {
                    requestedHours = Math.max(0, (new Date(form.endDate) - new Date(form.startDate)) / (1000 * 60 * 60));
                }
            }

            let isOverQuota = false;
            let quotaMessage = null;
            if (form.type === 'Leave' && form.subtype && form.empId) {
                const quotaInfo = data.settings.leaveTypes.find(l => l.name === form.subtype);
                if (quotaInfo && quotaInfo.quota) {
                    let usedDays = getUsedLeave(form.empId, form.subtype);
                    if (form.id && form.status === 'Approved') {
                        const oldReq = data.leaveRequests.find(r => r.id === form.id);
                        if (oldReq && oldReq.subtype === form.subtype) usedDays -= (parseFloat(oldReq.hours) / 8);
                    }
                    const remainDaysTotal = quotaInfo.quota - usedDays;
                    const requestedDaysTotal = requestedHours / 8;
                    
                    isOverQuota = requestedDaysTotal > remainDaysTotal;
                    const rDays = Math.floor(remainDaysTotal), rHours = (remainDaysTotal * 8) % 8;
                    const reqD = Math.floor(requestedDaysTotal), reqH = requestedHours % 8;
                    
                    quotaMessage = (
                        <div className={`mt-2 p-3 rounded-lg text-sm border ${isOverQuota ? 'bg-red-50 border-red-200 text-red-600 dark:bg-red-900/30 dark:border-red-800 dark:text-red-400' : 'bg-blue-50 border-blue-200 text-blue-600 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-400'}`}>
                            <div className="font-semibold mb-1">สถานะโควตาการลา</div>
                            <div className="flex justify-between"><span>โควตาคงเหลือ:</span> <b>{rDays} วัน {rHours} ชั่วโมง</b></div>
                            <div className="flex justify-between"><span>จำนวนที่ต้องการลา:</span> <b>{reqD} วัน {reqH} ชั่วโมง</b></div>
                            {isOverQuota && <div className="mt-2 text-center font-bold text-red-600 dark:text-red-400">⚠️ โควตาไม่เพียงพอ! ไม่สามารถบันทึกได้</div>}
                        </div>
                    );
                }
            }

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-6">
                        <h2 className="text-2xl font-bold">{t('leave_ot')}</h2>
                        <div className="flex gap-2">
                            <button onClick={forceRefresh} disabled={isSyncing} className="bg-white dark:bg-gray-800 border dark:border-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm transition"><span className={isSyncing ? "animate-spin text-[#c8a97e]" : "text-[#c8a97e]"}><Icons.Refresh /></span> {t('force_refresh')}</button>
                            <button onClick={() => { setForm(initialForm); setShowForm(true); }} className="bg-[#c8a97e] text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-[#b3956b] text-sm"><Icons.Plus /> {t('new_req')}</button>
                        </div>
                    </div>

                    {/* Quota Summary Cards (For Employee or viewing own) */}
                    <div className="mb-6 grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="col-span-full mb-2 font-semibold text-gray-600 dark:text-gray-300">{t('my_quotas')} ({new Date().getFullYear()})</div>
                        {data.settings.leaveTypes.map(lt => {
                            const used = getUsedLeave(user.empId, lt.name);
                            const total = lt.quota || '∞';
                            const remain = lt.quota ? (lt.quota - used) : '∞';
                            return (
                                <div key={lt.name} className="bg-white dark:bg-gray-800 p-4 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm flex flex-col items-center text-center">
                                    <span className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">{lt.name}</span>
                                    <div className="text-2xl font-bold text-[#c8a97e]">{remain} <span className="text-sm font-normal text-gray-400">{t('days')}</span></div>
                                    <div className="text-xs text-gray-400 mt-2">{t('used')}: {used} / {t('total')}: {total}</div>
                                </div>
                            )
                        })}
                    </div>

                    <div className="flex border-b dark:border-gray-700 mb-6">
                        {isAdmin && <button onClick={()=>setTab('requests')} className={`px-4 py-2 ${tab==='requests' ? 'border-b-2 border-[#c8a97e] text-[#c8a97e] font-semibold' : 'text-gray-500 hover:text-gray-700'}`}>{t('req_pending')} ({pendingReqs.length})</button>}
                        {isAdmin && <button onClick={()=>setTab('all')} className={`px-4 py-2 ${tab==='all' ? 'border-b-2 border-[#c8a97e] text-[#c8a97e] font-semibold' : 'text-gray-500 hover:text-gray-700'}`}>{t('all_history')}</button>}
                        <button onClick={()=>setTab('my_requests')} className={`px-4 py-2 ${tab==='my_requests' ? 'border-b-2 border-[#c8a97e] text-[#c8a97e] font-semibold' : 'text-gray-500 hover:text-gray-700'}`}>{t('my_req')}</button>
                    </div>

                    {tab === 'requests' && isAdmin && <Table reqs={pendingReqs} showName isPendingTab />}
                    {tab === 'all' && isAdmin && <Table reqs={allReqs} showName allowEditDelete />}
                    {tab === 'my_requests' && <Table reqs={myReqs} allowEditDelete />}

                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title={form.id ? 'แก้ไขข้อมูล' : t('new_req')}>
                        <form onSubmit={handleSubmit} className="space-y-4 text-gray-800 dark:text-gray-200">
                            {isAdmin && <div><label className="block text-sm mb-1">{t('employee')}</label><select value={form.empId} onChange={e=>setForm({...form, empId: e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2">{data.employees?.map(e => <option key={e.id} value={e.id}>{e.id} - {e.name}</option>)}</select></div>}
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div><label className="block text-sm mb-1">{t('type')}</label><select value={form.type} onChange={e=>setForm({...form, type: e.target.value, subtype: ''})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"><option>Leave</option><option>OT</option></select></div>
                                {form.type === 'Leave' ? (
                                    <div>
                                        <label className="block text-sm mb-1">{t('leave_type')}</label>
                                        <select value={form.subtype} onChange={e=>setForm({...form, subtype: e.target.value})} required className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2">
                                            <option value="">Select</option>
                                            {data.settings.leaveTypes
                                                .filter(lt => isAdmin || lt.access === 'all' || !lt.access)
                                                .map(lt=><option key={lt.name} value={lt.name}>{lt.name}</option>)
                                            }
                                        </select>
                                    </div>
                                ) : (
                                    <div><label className="block text-sm mb-1">OT Reason/Task</label><input type="text" value={form.subtype} onChange={e=>setForm({...form, subtype: e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2" required placeholder="e.g. Clear backlog"/></div>
                                )}
                            </div>
                            
                            <div className="mb-4">
                                <label className="block text-sm mb-1 font-medium">{t('duration_mode')}</label>
                                <div className="flex gap-6 mt-2">
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="durationMode" checked={form.durationMode === 'full'} onChange={() => setForm({...form, durationMode: 'full', startDate: '', endDate: ''})} className="accent-[#c8a97e] w-4 h-4" /> {t('full_day')}</label>
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="durationMode" checked={form.durationMode === 'hourly'} onChange={() => setForm({...form, durationMode: 'hourly', startDate: '', endDate: ''})} className="accent-[#c8a97e] w-4 h-4" /> {t('hourly')}</label>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div><label className="block text-sm mb-1">{t('start')}</label><input type={form.durationMode === 'full' ? 'date' : 'datetime-local'} value={form.startDate} onChange={e=>setForm({...form, startDate: e.target.value})} required className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                                <div><label className="block text-sm mb-1">{t('end')}</label><input type={form.durationMode === 'full' ? 'date' : 'datetime-local'} value={form.endDate} onChange={e=>setForm({...form, endDate: e.target.value})} required className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2"/></div>
                            </div>
                            
                            {isAdmin && form.id && (
                                <div>
                                    <label className="block text-sm mb-1">{t('status')}</label>
                                    <select value={form.status} onChange={e=>setForm({...form, status: e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2">
                                        <option value="Pending">Pending (รออนุมัติ)</option>
                                        <option value="Approved">Approved (อนุมัติ)</option>
                                        <option value="Rejected">Rejected (ปฏิเสธ)</option>
                                    </select>
                                </div>
                            )}

                            <div><label className="block text-sm mb-1">{t('reason')}</label><textarea value={form.reason} onChange={e=>setForm({...form, reason: e.target.value})} className="w-full border dark:border-gray-600 bg-white dark:bg-gray-700 rounded p-2 h-20" required></textarea></div>
                            
                            {/* แสดงกล่องแจ้งเตือนโควตา */}
                            {quotaMessage}

                            <div className="pt-4 flex justify-end gap-2 border-t dark:border-gray-700 mt-4">
                                <button type="button" onClick={()=>setShowForm(false)} className="px-4 py-2 border dark:border-gray-600 rounded">{t('cancel')}</button>
                                <button type="submit" disabled={isOverQuota} className={`px-4 py-2 text-white rounded transition ${isOverQuota ? 'bg-gray-400 cursor-not-allowed dark:bg-gray-600' : 'bg-[#c8a97e] hover:bg-[#b3956b]'}`}>{t('submit')}</button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        };

        const Payroll = () => {
            const { data, user, t, lang, addRecord, updateRecord, deleteRecord, forceRefresh, isSyncing } = useContext(AppContext);
            const isAdmin = user.role === 'Admin';
            const [viewSlip, setViewSlip] = useState(null);
            const [showCalc, setShowCalc] = useState(false);
            const fileInputRef = useRef(null);
            
            // Filters
            const [filterYear, setFilterYear] = useState('All');
            const [filterMonth, setFilterMonth] = useState('All');
            const [filterEmp, setFilterEmp] = useState('All');

            // Pagination state
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 15;

            // Reset page to 1 when filters change
            useEffect(() => {
                setCurrentPage(1);
            }, [filterYear, filterMonth, filterEmp]);

            const [calcForm, setCalcForm] = useState({ id: '', empId: '', year: new Date().getFullYear(), month: new Date().getMonth() + 1, customEarnings: [], customDeductions: [], dynamicIncomes: {}, dynamicDeductions: {} });

            const years = Array.from({length: 5}, (_, i) => new Date().getFullYear() - 2 + i);
            const months = Array.from({length: 12}, (_, i) => ({ val: i+1, label: new Date(0, i).toLocaleString(lang==='th'?'th-TH':'en-US', { month: 'long' }) }));

            // ดึงข้อมูลให้ถูกคน: ลบช่องว่างและไม่สนใจตัวพิมพ์เล็ก-ใหญ่
            const currentEmpId = String(user.empId || '').trim().toLowerCase();
            let rawRecords = isAdmin ? (data.salaryRecords || []) : (data.salaryRecords?.filter(r => String(r.empId || '').trim().toLowerCase() === currentEmpId) || []);

            // Apply Filters & Sorting (เรียงปีและเดือนจากล่าสุดไปเก่าสุด)
            const records = rawRecords
                .filter(r => filterYear === 'All' || String(r.year) === String(filterYear))
                .filter(r => filterMonth === 'All' || String(r.month) === String(filterMonth))
                .filter(r => filterEmp === 'All' || String(r.empId).trim() === String(filterEmp).trim())
                .sort((a, b) => {
                    const yearA = parseInt(a.year) || 0;
                    const yearB = parseInt(b.year) || 0;
                    if (yearB !== yearA) return yearB - yearA;
                    
                    const monthA = parseInt(a.month) || 0;
                    const monthB = parseInt(b.month) || 0;
                    return monthB - monthA;
                });

            // Calculate Pagination
            const totalPages = Math.ceil(records.length / itemsPerPage);
            const indexOfLastItem = currentPage * itemsPerPage;
            const indexOfFirstItem = indexOfLastItem - itemsPerPage;
            const currentRecords = records.slice(indexOfFirstItem, indexOfLastItem);

            const uniqueYears = [...new Set(rawRecords.map(r => r.year))].sort((a,b)=>b-a);

            useEffect(() => {
                if (calcForm.empId && calcForm.year && calcForm.month && data.settings?.incomes && !calcForm.id) {
                    const approvedOTs = data.leaveRequests?.filter(r => String(r.empId).trim().toLowerCase() === String(calcForm.empId).trim().toLowerCase() && r.type === 'OT' && r.status === 'Approved' && new Date(r.startDate).getMonth() + 1 === parseInt(calcForm.month) && new Date(r.startDate).getFullYear() === parseInt(calcForm.year)) || [];
                    const otHours = approvedOTs.reduce((sum, r) => sum + parseFloat(r.hours), 0);
                    
                    const otItem = data.settings.incomes.find(i => i.name.toLowerCase().includes('ot') || i.name.includes('โอที') || i.name.includes('ล่วงเวลา'));
                    if (otItem && otHours > 0 && !calcForm.dynamicIncomes[otItem.id]) {
                        setCalcForm(prev => ({ ...prev, dynamicIncomes: { ...prev.dynamicIncomes, [otItem.id]: otHours } }));
                    }
                }
            }, [calcForm.empId, calcForm.month, calcForm.year, data.leaveRequests, data.settings?.incomes, calcForm.id]);

            const selectedEmp = data.employees?.find(e => String(e.id).trim().toLowerCase() === String(calcForm.empId).trim().toLowerCase());
            const baseSalary = selectedEmp?.baseSalary || 0;
            
            let dynamicIncomesTotal = 0;
            const calcIncomes = [];
            (data.settings?.incomes || []).forEach(inc => {
                if (inc.type === 'percent') {
                    if (calcForm.dynamicIncomes[inc.id] !== false) { 
                        let amt = baseSalary * (inc.rate / 100);
                        if (inc.max) amt = Math.min(amt, parseFloat(inc.max));
                        dynamicIncomesTotal += amt;
                        calcIncomes.push({ name: inc.name, amount: amt });
                    }
                } else if (inc.type === 'multiplier') {
                    const qty = parseFloat(calcForm.dynamicIncomes[inc.id]) || 0;
                    if (qty > 0) {
                        let hourlyRate = baseSalary / 240; // 30 วัน * 8 ชั่วโมง
                        let amt = hourlyRate * inc.rate * qty;
                        if (inc.max) amt = Math.min(amt, parseFloat(inc.max));
                        dynamicIncomesTotal += amt;
                        calcIncomes.push({ name: inc.name, amount: amt, qty, rate: `${inc.rate} เท่า` });
                    }
                } else {
                    const qty = parseFloat(calcForm.dynamicIncomes[inc.id]) || 0;
                    if (qty > 0) {
                        let amt = inc.rate * qty;
                        if (inc.max) amt = Math.min(amt, parseFloat(inc.max));
                        dynamicIncomesTotal += amt;
                        calcIncomes.push({ name: inc.name, amount: amt, qty, rate: inc.rate });
                    }
                }
            });

            // เลื่อนการคำนวณรายรับรวมมาไว้ก่อน เพื่อนำยอดไปคำนวณหักเปอร์เซ็นต์ (เช่น ภาษี)
            const earningsTotal = baseSalary + dynamicIncomesTotal + calcForm.customEarnings.reduce((s, e) => s + (parseFloat(e.amount)||0), 0);

            let dynamicDeductionsTotal = 0;
            const calcDeductions = [];
            (data.settings?.deductions || []).forEach(ded => {
                if (ded.type === 'percent') {
                    if (calcForm.dynamicDeductions[ded.id] !== false) { 
                        // ตรวจสอบว่าเป็นประกันสังคมหรือไม่ ถ้าใช่ให้คิดจากเงินเดือนพื้นฐาน ถ้าไม่ใช่ให้คิดจากรายรับรวมทั้งหมด
                        const isSocialSecurity = ded.id === 'ded_ss' || ded.name.includes('ประกันสังคม');
                        const baseForCalc = isSocialSecurity ? baseSalary : earningsTotal;

                        let amt = baseForCalc * (ded.rate / 100);
                        if (ded.max) amt = Math.min(amt, parseFloat(ded.max));
                        dynamicDeductionsTotal += amt;
                        calcDeductions.push({ name: ded.name, amount: amt });
                    }
                } else if (ded.type === 'multiplier') {
                    const qty = parseFloat(calcForm.dynamicDeductions[ded.id]) || 0;
                    if (qty > 0) {
                        let hourlyRate = baseSalary / 240;
                        let amt = hourlyRate * ded.rate * qty;
                        if (ded.max) amt = Math.min(amt, parseFloat(ded.max));
                        dynamicDeductionsTotal += amt;
                        calcDeductions.push({ name: ded.name, amount: amt, qty, rate: `${ded.rate} เท่า` });
                    }
                } else {
                    const qty = parseFloat(calcForm.dynamicDeductions[ded.id]) || 0;
                    if (qty > 0) {
                        let amt = ded.rate * qty;
                        if (ded.max) amt = Math.min(amt, parseFloat(ded.max));
                        dynamicDeductionsTotal += amt;
                        calcDeductions.push({ name: ded.name, amount: amt, qty, rate: ded.rate });
                    }
                }
            });

            const deductionsTotal = dynamicDeductionsTotal + calcForm.customDeductions.reduce((s, d) => s + (parseFloat(d.amount)||0), 0);
            const netPay = earningsTotal - deductionsTotal;

            const handleEditClick = (record) => {
                setCalcForm({
                    id: record.id,
                    empId: record.empId,
                    year: record.year,
                    month: record.month,
                    customEarnings: record.customEarnings || [],
                    customDeductions: record.customDeductions || [],
                    dynamicIncomes: record.dynamicIncomes || {},
                    dynamicDeductions: record.dynamicDeductions || {}
                });
                setShowCalc(true);
            };

            const handleSaveRecord = () => {
                const record = { ...calcForm, baseSalary, calculatedIncomes: calcIncomes, calculatedDeductions: calcDeductions, netPay, date: new Date().toISOString() };
                
                if (calcForm.id) {
                    updateRecord('salaryRecords', calcForm.id, record);
                    setShowCalc(false); 
                    SwalAlert.fire('Updated', 'อัปเดตข้อมูลสำเร็จ', 'success');
                } else {
                    const exists = data.salaryRecords?.find(r => String(r.empId).trim().toLowerCase() === String(calcForm.empId).trim().toLowerCase() && r.year === parseInt(calcForm.year) && r.month === parseInt(calcForm.month));
                    if (exists) return SwalAlert.fire('Warning', 'เดือนนี้มีข้อมูลเงินเดือนของพนักงานท่านนี้แล้ว', 'warning');

                    record.id = 'PAY' + Date.now();
                    addRecord('salaryRecords', record);
                    setShowCalc(false); 
                    SwalAlert.fire('Saved', 'เพิ่มข้อมูลสำเร็จ', 'success');
                }
            };

            const arrUpdate = (type, action, index, field, value) => {
                const arr = [...calcForm[type]];
                if(action === 'add') arr.push({name:'', amount:0});
                else if(action === 'remove') arr.splice(index, 1);
                else arr[index][field] = field==='amount' ? (parseFloat(value)||0) : value;
                setCalcForm({...calcForm, [type]: arr});
            };

            const exportCSV = () => {
                const headers = ['ID', 'Employee ID', 'Year', 'Month', 'Base Salary', 'Net Pay', 'Date'];
                const rows = records.map(r => [r.id, r.empId, r.year, r.month, r.baseSalary, r.netPay, formatDate(r.date, 'en').replace(/,/g, '')]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", "payroll_export.csv");
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const rows = text.split('\n').filter(row => row.trim().length > 0);
                    if(rows.length < 2) return SwalAlert.fire('Error', 'ไม่พบข้อมูลในไฟล์ CSV', 'error');

                    const headers = rows[0].split(',').map(h => h.trim());
                    let added = 0, updated = 0;

                    for(let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',').map(c => c.trim());
                        const record = {};
                        headers.forEach((h, idx) => { record[h] = cols[idx] || ''; });
                        
                        const payObj = {
                            id: record['ID'] || '',
                            empId: record['Employee ID'] || '',
                            year: parseInt(record['Year']) || new Date().getFullYear(),
                            month: parseInt(record['Month']) || new Date().getMonth() + 1,
                            baseSalary: parseFloat(record['Base Salary']) || 0,
                            netPay: parseFloat(record['Net Pay']) || 0,
                            date: record['Date'] || new Date().toISOString()
                        };

                        if (payObj.empId) {
                            if (payObj.id && data.salaryRecords.find(ex => ex.id === payObj.id)) {
                                updateRecord('salaryRecords', payObj.id, payObj);
                                updated++;
                            } else {
                                if(!payObj.id) payObj.id = 'PAY' + Date.now().toString().slice(-4) + i; 
                                addRecord('salaryRecords', payObj);
                                added++;
                            }
                        }
                    }
                    SwalAlert.fire('Imported', `นำเข้าสำเร็จ! เพิ่ม ${added} รายการ, อัปเดต ${updated} รายการ`, 'success');
                    if (fileInputRef.current) fileInputRef.current.value = "";
                };
                reader.readAsText(file);
            };

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-6">
                        <h2 className="text-2xl font-bold">{isAdmin ? t('payroll') : t('my_salary')}</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <button onClick={forceRefresh} disabled={isSyncing} className="bg-white dark:bg-gray-800 border dark:border-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm transition"><span className={isSyncing ? "animate-spin text-[#c8a97e]" : "text-[#c8a97e]"}><Icons.Refresh /></span> {t('force_refresh')}</button>
                            
                            {isAdmin && (
                                <>
                                    <input type="file" accept=".csv" ref={fileInputRef} onChange={importCSV} className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-blue-100 dark:hover:bg-blue-800 text-sm transition"><Icons.Upload /> {t('import_csv')}</button>
                                    <button onClick={exportCSV} className="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-gray-300 dark:hover:bg-gray-600 text-sm transition"><Icons.Download /> {t('export_csv')}</button>
                                    <button onClick={() => { setCalcForm({ id: '', empId: '', year: new Date().getFullYear(), month: new Date().getMonth() + 1, customEarnings: [], customDeductions: [], dynamicIncomes: {}, dynamicDeductions: {} }); setShowCalc(true); }} className="bg-[#c8a97e] text-white px-4 py-2 rounded-lg flex items-center gap-1 hover:bg-[#b3956b] shadow-md text-sm transition"><Icons.Plus /> {t('calc_salary')}</button>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Filters */}
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 mb-6 flex flex-wrap gap-4 items-end">
                        <div>
                            <label className="block text-xs text-gray-500 mb-1">{t('year')}</label>
                            <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} className="border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 rounded p-2 text-sm w-32">
                                <option value="All">{t('filter_all')}</option>
                                {uniqueYears.map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                        </div>
                        <div>
